<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Wants to be a Monopoly?</title>
    <style>
        :root {
            --bg-color: #000033;
            --gold: #ffd700;
            --blue-gradient: linear-gradient(to bottom, #10107a 0%, #000033 100%);
            --correct-green: #00ff00;
            --wrong-red: #ff0000;
            --border-style: 2px solid #5555ff;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 900px;
            text-align: center;
            padding: 20px;
        }

        h1 { color: var(--gold); text-shadow: 2px 2px #000; font-size: 2.2rem; margin-bottom: 5px; }

        /* Setup Screen */
        .player-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 5px;
        }
        input[type="text"] { padding: 5px; border-radius: 4px; border: none; width: 60%; }

        /* District Grid */
        .district-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 10px;
        }

        .btn {
            background: var(--blue-gradient);
            border: var(--border-style);
            color: white;
            padding: 12px 5px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        /* Area Colors */
        .btn.hk-island { background: linear-gradient(to bottom, #4b0082, #000033); border-color: #9370db; }
        .btn.kowloon { background: linear-gradient(to bottom, #800000, #000033); border-color: #ff4444; }
        .btn.new-territories { background: linear-gradient(to bottom, #004d00, #000033); border-color: #00ff00; }
        
        .btn:hover:not(:disabled) { border-color: white; transform: scale(1.03); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Active Player Selector */
        #player-selection-list { margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; }
        .player-pick-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid var(--gold);
            background: rgba(0,0,0,0.5);
            color: white;
            cursor: pointer;
            border-radius: 20px;
        }
        .player-pick-btn.selected { background: var(--gold); color: black; font-weight: bold; }

        /* Quiz UI */
        .question-box {
            border: var(--border-style);
            padding: 30px 15px;
            margin: 20px 0;
            border-radius: 50px / 25px;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.6);
        }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .answer-btn {
            background: var(--blue-gradient);
            border: var(--border-style);
            color: white;
            padding: 15px;
            text-align: left;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }
        .answer-btn:hover { background: orange; color: black; }

        /* Action Buttons */
        .utility-btn {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        .utility-btn:hover { color: white; border-color: white; }
        .back-btn { background: #800000; color: white; border: 1px solid red; margin-bottom: 10px; }

        /* Owners info */
        .owner-tag { font-size: 0.7rem; color: var(--gold); margin-top: 4px; }
        #info-btn { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; font-weight: bold; z-index: 10; }

        /* Modals */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--blue-gradient);
            border: 4px solid var(--gold);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 450px;
        }
        .correct-text { color: var(--correct-green); font-size: 2rem; }
        .wrong-text { color: var(--wrong-red); font-size: 2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-view">
        <h1>Who Wants to be a Monopoly?</h1>
        <p>Players (4-8): <input type="number" id="player-count" min="4" max="8" value="4" onchange="createInputs()"></p>
        <div id="name-inputs"></div>
        <button class="btn" onclick="startGame()" style="margin-top:20px; width: 200px;">START GAME</button>
    </div>

    <div id="district-view" class="hidden">
        <div id="active-player-selector">
            <p style="color: var(--gold); margin:0;">Who is answering now?</p>
            <div id="player-selection-list"></div>
        </div>
        <div class="district-grid" id="district-buttons"></div>
        
        <div style="margin-top: 20px;">
            <button class="utility-btn" onclick="undoLastAction()" id="undo-btn">Undo Last Turn</button>
            <button class="utility-btn" onclick="location.reload()">Reset Game</button>
        </div>
    </div>

    <div id="quiz-view" class="hidden">
        <button class="utility-btn back-btn" onclick="exitQuiz()">← Back to Map</button>
        <h2 id="quiz-header" style="color: var(--gold);"></h2>
        <div class="question-box" id="question-text"></div>
        <div class="answers-grid" id="answer-buttons"></div>
    </div>
</div>

<button id="info-btn" class="hidden" onclick="showScoreboard()">SCORE</button>

<div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-body" style="font-size: 1.2rem; line-height: 1.5;"></p>
        <button class="btn" style="width: 100%;" onclick="closeModal()">Next Turn</button>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTC0Vh7S-4MaHssZu1WUvUI7pV1VgbWgrHo2K04KUAj_IfGc_6zYmLZ8650rmRJrLMKce88AUn4hbY2/pub?output=csv';
    
    let quizData = {};
    let answeredQuestions = {}; // Format: { "Wan Chai": [0, 2] }
    let districtOwners = {};   // Format: { "Wan Chai": "Player Name" }
    let players = [];
    let activeIdx = 0;
    let history = []; // Stack to store game states for Undo

    // Load Data
    async function loadData() {
        try {
            const res = await fetch(sheetUrl);
            const text = await res.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 7) {
                    const dist = cols[0].replace(/"/g, "").trim();
                    if (!quizData[dist]) quizData[dist] = [];
                    quizData[dist].push({
                        q: cols[1].replace(/"/g, "").trim(),
                        a: [cols[2], cols[3], cols[4], cols[5]].map(s => s.replace(/"/g, "").trim()),
                        correct: parseInt(cols[6])
                    });
                }
            }
            createInputs();
        } catch(e) { console.error("CSV Load Error", e); }
    }

    function createInputs() {
        const count = document.getElementById('player-count').value;
        const container = document.getElementById('name-inputs');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `<div class="player-name-row"><span>#${i}</span><input type="text" id="p${i}" value="Player ${i}"></div>`;
        }
    }

    function startGame() {
        const count = document.getElementById('player-count').value;
        players = [];
        for(let i=1; i<=count; i++) players.push(document.getElementById(`p${i}`).value);
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        document.getElementById('info-btn').classList.remove('hidden');
        renderMain();
    }

    function renderMain() {
        // Player selector
        const pList = document.getElementById('player-selection-list');
        pList.innerHTML = '';
        players.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = `player-pick-btn ${activeIdx === i ? 'selected' : ''}`;
            b.innerText = name;
            b.onclick = () => { activeIdx = i; renderMain(); };
            pList.appendChild(b);
        });

        // Districts
        const grid = document.getElementById('district-buttons');
        grid.innerHTML = '';
        const areas = {
            "hk-island": ["Central & Western", "Wan Chai", "Eastern", "Southern"],
            "kowloon": ["Yau Tsim Mong", "Sham Shui Po", "Kowloon City", "Wong Tai Sin", "Kwun Tong"],
            "new-territories": ["Kwai Tsing", "Tsuen Wan", "Tuen Mun", "Yuen Long", "North", "Tai Po", "Sha Tin", "Sai Kung", "Islands"]
        };

        Object.keys(quizData).forEach(d => {
            const avail = quizData[d].filter((_, i) => !(answeredQuestions[d] && answeredQuestions[d].includes(i)));
            const b = document.createElement('button');
            b.className = 'btn';
            
            if (areas["hk-island"].includes(d)) b.classList.add('hk-island');
            else if (areas["kowloon"].includes(d)) b.classList.add('kowloon');
            else b.classList.add('new-territories');

            b.innerHTML = `${d}<br><small>${avail.length} left</small>`;
            if (districtOwners[d]) b.innerHTML += `<div class="owner-tag">👑 ${districtOwners[d]}</div>`;
            
            b.disabled = avail.length === 0;
            b.onclick = () => startQuiz(d, avail);
            grid.appendChild(b);
        });

        // Show/Hide Undo button
        document.getElementById('undo-btn').style.display = history.length > 0 ? "inline-block" : "none";
    }

    function startQuiz(district, available) {
        // Pick a random question but DON'T record it as answered yet
        const qObj = available[Math.floor(Math.random() * available.length)];
        const qIdx = quizData[district].indexOf(qObj);

        document.getElementById('district-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        document.getElementById('quiz-header').innerText = `${players[activeIdx]} is challenging ${district}`;
        document.getElementById('question-text').innerText = qObj.q;

        const container = document.getElementById('answer-buttons');
        container.innerHTML = '';

        // --- UPDATED SECTION: ADDING LETTERS ---
        const letters = ['A', 'B', 'C', 'D']; 
        qObj.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = 'answer-btn';
            // Combine the letter with the answer text
            b.innerText = `${letters[i]}. ${ans}`; 
            b.onclick = () => check(district, qIdx, i, qObj.correct);
            container.appendChild(b);
        });
        // ---------------------------------------
    }

    function exitQuiz() {
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        renderMain();
    }

    function check(district, qIdx, selected, correct) {
        const qObj = quizData[district][qIdx];
        const activePlayer = players[activeIdx];
        const isCorrect = selected === correct;

        // Save state to history before changing anything
        history.push({
            district: district,
            qIdx: qIdx,
            previousOwner: districtOwners[district] || null,
            wasCorrect: isCorrect,
            playerWhoActed: activePlayer
        });

        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');

        if (isCorrect) {
            const prev = districtOwners[district];
            districtOwners[district] = activePlayer;
            title.innerText = "CORRECT! 🎉";
            title.className = "correct-text";
            body.innerText = prev && prev !== activePlayer 
                ? `${activePlayer} has stolen ${district} from ${prev}!` 
                : `${activePlayer} now controls ${district}!`;
        } else {
            title.innerText = "WRONG ❌";
            title.className = "wrong-text";
            body.innerHTML = `The correct answer was:<br><strong style="color:var(--gold); font-size:1.4rem;">${qObj.a[correct]}</strong>`;
        }

        // Now officially mark it as answered
        if (!answeredQuestions[district]) answeredQuestions[district] = [];
        answeredQuestions[district].push(qIdx);
        
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function undoLastAction() {
        if (history.length === 0) return;
        
        const lastAction = history.pop();
        
        // 1. Restore the question to the pool
        const qArr = answeredQuestions[lastAction.district];
        const index = qArr.indexOf(lastAction.qIdx);
        if (index > -1) qArr.splice(index, 1);

        // 2. Restore the ownership
        if (lastAction.previousOwner) {
            districtOwners[lastAction.district] = lastAction.previousOwner;
        } else {
            delete districtOwners[lastAction.district];
        }

        alert(`Undone: ${lastAction.playerWhoActed}'s turn at ${lastAction.district} reverted.`);
        renderMain();
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        renderMain();
    }

    function showScoreboard() {
        const scores = {};
        players.forEach(p => scores[p] = 0);
        Object.values(districtOwners).forEach(owner => scores[owner]++);

        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        title.innerText = "Scoreboard";
        title.className = "";
        
        let html = "<div style='text-align:left;'>";
        players.forEach(p => {
            html += `<p><strong>${p}:</strong> ${scores[p]} Districts</p>`;
        });
        html += "</div>";
        body.innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    loadData();
</script>
</body>
</html>
