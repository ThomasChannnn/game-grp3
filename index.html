<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK 18 Districts: Battle Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="setup-view">
        <div id="player-setup" style="max-width: 500px;">
            <h1>Game Setup</h1>
            <p>Number of Players (4-8): 
               <input type="number" id="player-count" min="4" max="8" value="4" onchange="generateNameInputs()">
            </p>
            <div id="name-inputs-container" style="margin: 20px 0;"></div>
            <button class="btn" onclick="startGame()">Start Battle</button>
        </div>
    </div>

    <div id="district-view" class="hidden">
        <div id="active-player-selector">
            <p style="margin-top:0; color: var(--gold);">1. Select who is answering:</p>
            <div id="player-selection-list"></div>
        </div>
        
        <p style="color: #aaa;">2. Pick a District:</p>
        <div class="district-grid" id="district-buttons"></div>
        <button id="reset-btn" onclick="resetProgress()">Reset Game</button>
    </div>

    <div id="quiz-view" class="hidden">
        <h2 id="current-district-name" style="color: var(--gold);"></h2>
        <div class="question-box" id="question-text"></div>
        <div class="answers-grid" id="answer-buttons"></div>
    </div>
</div>

<button id="info-btn" class="hidden" onclick="showOwnership()">OWNERS</button>

<div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
        <div id="owner-list" class="hidden" style="text-align: left; margin: 20px 0; max-height: 200px; overflow-y: auto;"></div>
        <button class="btn" id="modal-close-btn" style="width: 100%;" onclick="closeModal()">Continue</button>
    </div>
</div>

<script>
    let quizData = {};
    let answeredQuestions = {};
    let districtOwners = {};
    let players = [];
    let selectedPlayerIndex = 0;

    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTC0Vh7S-4MaHssZu1WUvUI7pV1VgbWgrHo2K04KUAj_IfGc_6zYmLZ8650rmRJrLMKce88AUn4hbY2/pub?output=csv';

    async function loadData() {
        const response = await fetch(sheetUrl);
        const data = await response.text();
        parseCSV(data);
        generateNameInputs();
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 7) {
                const district = cols[0].replace(/"/g, "").trim();
                const q = cols[1].replace(/"/g, "").trim();
                const a = [cols[2], cols[3], cols[4], cols[5]].map(s => s.replace(/"/g, "").trim());
                const correct = parseInt(cols[6]);
                if (!quizData[district]) quizData[district] = [];
                quizData[district].push({ q, a, correct });
            }
        }
    }

    function generateNameInputs() {
        const count = document.getElementById('player-count').value;
        const container = document.getElementById('name-inputs-container');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div class="player-name-row">
                    <label>Player ${i}:</label>
                    <input type="text" id="pname-${i}" value="Player ${i}" maxlength="12">
                </div>`;
        }
    }

    function startGame() {
        const count = document.getElementById('player-count').value;
        players = [];
        for(let i=1; i<=count; i++) {
            players.push(document.getElementById(`pname-${i}`).value);
        }
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        document.getElementById('info-btn').classList.remove('hidden');
        init();
    }

    function init() {
        // Render Player Selection
        const pList = document.getElementById('player-selection-list');
        pList.innerHTML = '';
        players.forEach((name, idx) => {
            const b = document.createElement('button');
            b.className = `player-pick-btn ${selectedPlayerIndex === idx ? 'selected' : ''}`;
            b.innerText = name;
            b.onclick = () => {
                selectedPlayerIndex = idx;
                init(); // Re-render to show selection
            };
            pList.appendChild(b);
        });

        // Render Districts
        const grid = document.getElementById('district-buttons');
        grid.innerHTML = '';
        const areas = {
            "HK-Island": ["Central & Western", "Wan Chai", "Eastern", "Southern"],
            "Kowloon": ["Yau Tsim Mong", "Sham Shui Po", "Kowloon City", "Wong Tai Sin", "Kwun Tong"],
            "New-Territories": ["Kwai Tsing", "Tsuen Wan", "Tuen Mun", "Yuen Long", "North", "Tai Po", "Sha Tin", "Sai Kung", "Islands"]
        };

        Object.keys(quizData).forEach(d => {
            const avail = quizData[d].filter((_, i) => !(answeredQuestions[d] && answeredQuestions[d].includes(i)));
            const btn = document.createElement('button');
            btn.className = 'btn';
            if (areas["HK-Island"].includes(d)) btn.classList.add('hk-island');
            else if (areas["Kowloon"].includes(d)) btn.classList.add('kowloon');
            else if (areas["New-Territories"].includes(d)) btn.classList.add('new-territories');

            let ownerName = districtOwners[d] || "Unclaimed";
            btn.innerHTML = `${d}<br><small>${avail.length} left</small><div class="owner-tag">${ownerName}</div>`;
            
            btn.disabled = avail.length === 0;
            if (!btn.disabled) btn.onclick = () => showQuestion(d, avail);
            grid.appendChild(btn);
        });
    }

    function showQuestion(district, available) {
        const qObj = available[Math.floor(Math.random() * available.length)];
        const qIdx = quizData[district].indexOf(qObj);

        document.getElementById('district-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        document.getElementById('current-district-name').innerText = `${players[selectedPlayerIndex]} @ ${district}`;
        document.getElementById('question-text').innerText = qObj.q;

        const container = document.getElementById('answer-buttons');
        container.innerHTML = '';
        qObj.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = 'answer-btn';
            b.innerText = ans;
            b.onclick = () => checkAnswer(district, qIdx, i, qObj.correct);
            container.appendChild(b);
        });
    }

    function checkAnswer(district, qIdx, selected, correct) {
        const isCorrect = selected === correct;
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        const activePlayerName = players[selectedPlayerIndex];
        
        if (isCorrect) {
            const prevOwner = districtOwners[district];
            districtOwners[district] = activePlayerName;
            title.innerText = "CORRECT!";
            title.className = "correct-text";
            body.innerText = (prevOwner && prevOwner !== activePlayerName) 
                ? `${activePlayerName} captured ${district} from ${prevOwner}!` 
                : `${activePlayerName} is now the owner of ${district}!`;
        } else {
            title.innerText = "WRONG";
            title.className = "wrong-text";
            body.innerHTML = `Wrong answer. ${district} remains with ${districtOwners[district] || 'no one'}.`;
        }

        if (!answeredQuestions[district]) answeredQuestions[district] = [];
        answeredQuestions[district].push(qIdx);

        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('owner-list').classList.add('hidden');
    }

    function showOwnership() {
        const title = document.getElementById('modal-title');
        const list = document.getElementById('owner-list');
        title.innerText = "Scoreboard";
        title.className = "";
        
        // Count districts per player
        const scores = {};
        players.forEach(p => scores[p] = 0);
        Object.values(districtOwners).forEach(owner => { if(scores[owner] !== undefined) scores[owner]++; });

        let html = "<h3>Districts Owned:</h3><ul>";
        players.forEach(p => {
            html += `<li><strong>${p}:</strong> ${scores[p]} districts</li>`;
        });
        html += "</ul><hr><h3>Detailed Control:</h3><ul>";
        Object.keys(quizData).forEach(d => {
            html += `<li>${d}: ${districtOwners[d] || "Unclaimed"}</li>`;
        });
        html += "</ul>";
        
        list.innerHTML = html;
        list.classList.remove('hidden');
        document.getElementById('modal-body').innerText = "";
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        init();
    }

    function resetProgress() {
        if(confirm("Reset whole game?")) location.reload();
    }

    loadData();
</script>
</body>
</html>
