<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong 18 Districts: Millionaire Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="district-view">
        <h1>Hong Kong 18 Districts</h1>
        <div class="stats-text">Questions Left: <span id="total-count">0</span></div>
        <div id="loading">Syncing with Google Sheets...</div>
        <div class="district-grid" id="district-buttons"></div>
        <button id="reset-btn" onclick="resetProgress()">Reset Progress</button>
    </div>

    <div id="quiz-view" class="hidden">
        <h2 id="current-district-name" style="color: var(--gold);"></h2>
        <div class="question-box" id="question-text"></div>
        <div class="answers-grid" id="answer-buttons"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
        <button class="btn" style="width: 100%;" onclick="closeModal()">Continue</button>
    </div>
</div>

<script>
    let quizData = {};
    let answeredQuestions = JSON.parse(localStorage.getItem('hk_quiz_data')) || {};
    
    // YOUR GOOGLE SHEETS CSV LINK
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTC0Vh7S-4MaHssZu1WUvUI7pV1VgbWgrHo2K04KUAj_IfGc_6zYmLZ8650rmRJrLMKce88AUn4hbY2/pub?output=csv';

    async function loadQuestions() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            parseCSV(data);
            document.getElementById('loading').style.display = 'none';
            init();
        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "Error syncing with Google Sheets. Check connection.";
        }
    }

    function parseCSV(text) {
        // Splitting by lines while handling potential quoted commas in CSV
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
        
        // Skip header row
        for (let i = 1; i < lines.length; i++) {
            // Regex to handle CSV columns even if they contain commas inside quotes
            const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (cols.length >= 7) {
                const district = cols[0].replace(/"/g, "").trim();
                const q = cols[1].replace(/"/g, "").trim();
                const a1 = cols[2].replace(/"/g, "").trim();
                const a2 = cols[3].replace(/"/g, "").trim();
                const a3 = cols[4].replace(/"/g, "").trim();
                const a4 = cols[5].replace(/"/g, "").trim();
                const correct = parseInt(cols[6].replace(/"/g, ""));

                if (!quizData[district]) quizData[district] = [];
                quizData[district].push({
                    q: q,
                    a: [a1, a2, a3, a4],
                    correct: correct
                });
            }
        }
    }

    function init() {
        const grid = document.getElementById('district-buttons');
        grid.innerHTML = '';
        let count = 0;

        const areas = {
            "HK-Island": ["Central & Western", "Wan Chai", "Eastern", "Southern"],
            "Kowloon": ["Yau Tsim Mong", "Sham Shui Po", "Kowloon City", "Wong Tai Sin", "Kwun Tong"],
            "New-Territories": ["Kwai Tsing", "Tsuen Wan", "Tuen Mun", "Yuen Long", "North", "Tai Po", "Sha Tin", "Sai Kung", "Islands"]
        };

        Object.keys(quizData).forEach(d => {
            const avail = quizData[d].filter((_, i) => !(answeredQuestions[d] && answeredQuestions[d].includes(i)));
            const btn = document.createElement('button');
            
            btn.classList.add('btn');

            if (areas["HK-Island"].includes(d)) {
                btn.classList.add('hk-island');
            } else if (areas["Kowloon"].includes(d)) {
                btn.classList.add('kowloon');
            } else if (areas["New-Territories"].includes(d)) {
                btn.classList.add('new-territories');
            }

            btn.innerHTML = `${d}<br><small>${avail.length} left</small>`;
            btn.disabled = avail.length === 0;
            
            if (!btn.disabled) btn.onclick = () => showQuestion(d, avail);
            
            grid.appendChild(btn);
            count += avail.length;
        });
        document.getElementById('total-count').innerText = count;
    }

    function showQuestion(district, available) {
        const qObj = available[Math.floor(Math.random() * available.length)];
        const qIdx = quizData[district].indexOf(qObj);

        document.getElementById('district-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        document.getElementById('current-district-name').innerText = district;
        document.getElementById('question-text').innerText = qObj.q;

        const container = document.getElementById('answer-buttons');
        container.innerHTML = '';
        qObj.a.forEach((ans, i) => {
            const b = document.createElement('button');
            b.className = 'answer-btn';
            b.innerText = ans;
            b.onclick = () => checkAnswer(district, qIdx, i, qObj.correct);
            container.appendChild(b);
        });
    }

    function checkAnswer(district, qIdx, selected, correct) {
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        const isCorrect = selected === correct;

        if (isCorrect) {
            title.innerText = "CORRECT!";
            title.className = "correct-text";
            body.innerText = "Excellent! You know your districts.";
        } else {
            title.innerText = "WRONG";
            title.className = "wrong-text";
            body.innerHTML = `The correct answer was:<br><strong>${quizData[district][qIdx].a[correct]}</strong>`;
        }

        if (!answeredQuestions[district]) answeredQuestions[district] = [];
        answeredQuestions[district].push(qIdx);
        localStorage.setItem('hk_quiz_data', JSON.stringify(answeredQuestions));

        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('district-view').classList.remove('hidden');
        init();
    }

    function resetProgress() {
        if(confirm("Wipe all progress?")) {
            localStorage.removeItem('hk_quiz_data');
            answeredQuestions = {};
            init();
        }
    }

    loadQuestions();
</script>
</body>
</html>
